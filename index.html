<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Overview — Watchlist</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="dot"></span> Polly's watchlist</div>
  <div class="nav-wrap">
    <button class="nav-toggle" id="nav-toggle"><i class="ti ti-menu-2"></i> Menu</button>
    <div class="nav-menu" id="nav-menu">
      <a href="index.html" data-page="overview">Overview</a>
      <a href="watchlist.html" data-page="watchlist">Watchlist</a>
      <a href="signals.html" data-page="signals">Signals</a>
      <a href="settings.html" data-page="settings">Settings</a>
    </div>
  </div>
</header>

<main>
  <p class="page-title">Overview</p>
  <p class="page-sub" id="updated-line">Loading…</p>

  <div class="stat-grid" id="stat-grid"></div>

  <p style="font-size:14px;font-weight:600;margin:0 0 10px;">Top signals right now</p>
  <div id="top-signals"></div>

  <div class="footer-note">Static snapshot dashboard — data in <code>data.json</code> is refreshed manually, not a live feed.</div>
</main>

<script src="app.js"></script>
<script>
initNav('overview');

loadData().then(data => {
  document.getElementById('updated-line').textContent = 'Snapshot: ' + data.updated + ' · via web search, not live-linked';

  const allItems = data.tiers.flatMap(t => t.items);
  const movers = allItems.filter(i => typeof i.change === 'number');
  const up = movers.filter(i => i.change > 0).length;
  const down = movers.filter(i => i.change < 0).length;
  const nearStop = data.tiers.flatMap(t => t.items).filter(i => i.status === 'watch' || i.status === 'check').length;

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><p class="label">Watchlist names</p><p class="value">${allItems.length}</p></div>
    <div class="stat-card"><p class="label">Movers up</p><p class="value" style="color:var(--success)">${up}</p></div>
    <div class="stat-card"><p class="label">Movers down</p><p class="value" style="color:var(--danger)">${down}</p></div>
    <div class="stat-card"><p class="label">Flagged for review</p><p class="value" style="color:var(--warning)">${nearStop}</p></div>
  `;

  document.getElementById('top-signals').innerHTML = data.signals.slice(0, 3).map(signalHTML).join('');
});
</script>
</body>
</html>
