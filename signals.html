<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signals</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="dot"></span> Polly's watchlist</div>
  <div class="nav-wrap">
    <button class="nav-toggle" id="nav-toggle"><i class="ti ti-menu-2"></i> Menu</button>
    <div class="nav-menu" id="nav-menu">
      <a href="index.html" data-page="overview">Overview</a>
      <a href="watchlist.html" data-page="watchlist">Watchlist</a>
      <a href="signals.html" data-page="signals">Signals</a>
      <a href="settings.html" data-page="settings">Settings</a>
    </div>
  </div>
</header>

<main>
  <p class="page-title">Market signals</p>
  <p class="page-sub" id="updated-line">What to watch before the market reacts — a news synthesis, not a live feed.</p>

  <div id="signal-list"></div>

  <div class="footer-note">This is a synthesis of public reporting, not financial advice. Use it to know what to check before you act, not as a buy or sell signal.</div>
</main>

<script src="app.js"></script>
<script>
initNav('signals');
loadData().then(data => {
  document.getElementById('signal-list').innerHTML = data.signals.map(signalHTML).join('');
});
</script>
</body>
</html>
